syntax = "proto3";

package logripper.domain;

option csharp_namespace = "LogRipper.Domain";

// Durable local-station defaults/configuration used to compose saved QSOs.
message StationProfile {
  optional string profile_name = 1;  // Friendly label for the active station context
  string station_callsign = 2;  // Local station callsign default
  optional string operator_callsign = 3;  // Operator identity when distinct from the station callsign
  optional string operator_name = 4;  // Human-readable operator name
  optional string grid = 5;  // Logging station grid square
  optional string county = 6;  // Logging station county
  optional string state = 7;  // Logging station state/province
  optional string country = 8;  // Logging station country name
  optional uint32 dxcc = 9;  // Logging station DXCC entity code
  optional uint32 cq_zone = 10;  // Logging station CQ zone
  optional uint32 itu_zone = 11;  // Logging station ITU zone
  optional double latitude = 12;  // Logging station latitude in decimal degrees
  optional double longitude = 13;  // Logging station longitude in decimal degrees
}
