syntax = "proto3";

package logripper.domain;

option csharp_namespace = "LogRipper.Domain";

// Immutable local-station values captured on a saved QSO.
message StationSnapshot {
  optional string profile_name = 1;  // Active profile label at save time
  string station_callsign = 2;  // Local station callsign used for this QSO
  optional string operator_callsign = 3;  // Operator identity used for this QSO
  optional string operator_name = 4;  // Human-readable operator name at save time
  optional string grid = 5;  // Logging station grid square used for this QSO
  optional string county = 6;  // Logging station county used for this QSO
  optional string state = 7;  // Logging station state/province used for this QSO
  optional string country = 8;  // Logging station country used for this QSO
  optional uint32 dxcc = 9;  // Logging station DXCC entity used for this QSO
  optional uint32 cq_zone = 10;  // Logging station CQ zone used for this QSO
  optional uint32 itu_zone = 11;  // Logging station ITU zone used for this QSO
  optional double latitude = 12;  // Logging station latitude in decimal degrees
  optional double longitude = 13;  // Logging station longitude in decimal degrees
  optional string arrl_section = 14;  // Logging station ARRL section used for this QSO
}
