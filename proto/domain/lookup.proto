syntax = "proto3";

package logripper.domain;

option csharp_namespace = "LogRipper.Domain";

import "domain/callsign.proto";

// The state of an in-flight or completed lookup operation.
//
// State machine for streaming lookups (StreamLookup):
//   LOADING → (STALE)? → FOUND | NOT_FOUND | ERROR
//
// For unary lookups (Lookup, GetCachedCallsign) the response state will be
// one of the terminal states: FOUND, NOT_FOUND, ERROR, or UNSPECIFIED (error).
enum LookupState {
  LOOKUP_STATE_UNSPECIFIED = 0;  // Default/zero value — should not appear in normal responses
  LOOKUP_STATE_LOADING     = 1;  // Request in flight; emitted first by StreamLookup
  LOOKUP_STATE_FOUND       = 2;  // Callsign resolved successfully; record field is populated
  LOOKUP_STATE_NOT_FOUND   = 3;  // Callsign does not exist in the provider
  LOOKUP_STATE_ERROR       = 4;  // Provider error (network, auth, rate limit); see error_message
  LOOKUP_STATE_STALE       = 5;  // Returning cached data while a background refresh is pending
  LOOKUP_STATE_CANCELLED   = 6;  // Lookup was superseded by a newer request
}

// Result of a callsign lookup.
//
// Used by both unary (Lookup, GetCachedCallsign) and streaming (StreamLookup) RPCs.
// The state field always carries the semantic outcome. gRPC status is OK in all normal cases.
//
// Clients should handle all LookupState values including future additions — use a
// default/fallback branch when switching on state.
message LookupResult {
  LookupState state            = 1;  // Outcome of the lookup
  optional CallsignRecord record = 2;  // Populated when state == FOUND
  optional string error_message  = 3;  // Human-readable error when state == ERROR
  bool cache_hit               = 4;  // True if result was served from L1 cache
  uint32 lookup_latency_ms     = 5;  // Round-trip latency in milliseconds
  string queried_callsign      = 6;  // Echo of the original requested callsign
}

// Request to look up a callsign.
message LookupRequest {
  string callsign              = 1;
  bool skip_cache              = 2;  // Force fresh lookup, bypass L1 cache
}

// Request to look up a specific callsign from cache only.
message CachedCallsignRequest {
  string callsign              = 1;
}

// Request for DXCC entity information.
message DxccRequest {
  oneof query {
    uint32 dxcc_code           = 1;   // By numeric DXCC entity code
    string prefix              = 2;   // By callsign prefix (QRZ does 4->3->2 letter reduction)
  }
}

// Batch lookup request for prefetch scenarios (e.g., contest pre-population).
message BatchLookupRequest {
  repeated string callsigns    = 1;
}

// Batch lookup response.
message BatchLookupResponse {
  repeated LookupResult results = 1;
}
