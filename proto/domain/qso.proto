syntax = "proto3";

package logripper.domain;

option csharp_namespace = "LogRipper.Domain";

import "google/protobuf/timestamp.proto";

// Standard amateur radio frequency bands (full ADIF 3.1.7 enumeration).
enum Band {
  BAND_UNSPECIFIED = 0;
  BAND_2190M      = 1;   // 0.1357–0.1378 MHz
  BAND_630M       = 2;   // 0.472–0.479 MHz
  BAND_560M       = 3;   // 0.501–0.504 MHz
  BAND_160M       = 4;   // 1.8–2.0 MHz
  BAND_80M        = 5;   // 3.5–4.0 MHz
  BAND_60M        = 6;   // 5.06–5.45 MHz
  BAND_40M        = 7;   // 7.0–7.3 MHz
  BAND_30M        = 8;   // 10.1–10.15 MHz
  BAND_20M        = 9;   // 14.0–14.35 MHz
  BAND_17M        = 10;  // 18.068–18.168 MHz
  BAND_15M        = 11;  // 21.0–21.45 MHz
  BAND_12M        = 12;  // 24.89–24.99 MHz
  BAND_10M        = 13;  // 28.0–29.7 MHz
  BAND_8M         = 14;  // 40–45 MHz
  BAND_6M         = 15;  // 50–54 MHz
  BAND_5M         = 16;  // 54.000001–69.9 MHz
  BAND_4M         = 17;  // 70–71 MHz
  BAND_2M         = 18;  // 144–148 MHz
  BAND_1_25M      = 19;  // 222–225 MHz
  BAND_70CM       = 20;  // 420–450 MHz
  BAND_33CM       = 21;  // 902–928 MHz
  BAND_23CM       = 22;  // 1240–1300 MHz
  BAND_13CM       = 23;  // 2300–2450 MHz
  BAND_9CM        = 24;  // 3300–3500 MHz
  BAND_6CM        = 25;  // 5650–5925 MHz
  BAND_3CM        = 26;  // 10000–10500 MHz
  BAND_1_25CM     = 27;  // 24000–24250 MHz
  BAND_6MM        = 28;  // 47000–47200 MHz
  BAND_4MM        = 29;  // 75500–81000 MHz
  BAND_2_5MM      = 30;  // 119980–123000 MHz
  BAND_2MM        = 31;  // 134000–149000 MHz
  BAND_1MM        = 32;  // 241000–250000 MHz
  BAND_SUBMM      = 33;  // 300000–7500000 MHz
}

// Standard operating modes (full ADIF 3.1.7 Mode enumeration).
// Submodes are represented as a string field on QsoRecord, not an enum.
enum Mode {
  MODE_UNSPECIFIED  = 0;
  MODE_AM           = 1;
  MODE_ARDOP        = 2;
  MODE_ATV          = 3;
  MODE_CHIP         = 4;
  MODE_CLO          = 5;
  MODE_CONTESTI     = 6;
  MODE_CW           = 7;
  MODE_DIGITALVOICE = 8;   // Submodes: C4FM, DMR, DSTAR, FREEDV, M17
  MODE_DOMINO       = 9;
  MODE_DYNAMIC      = 10;  // Submodes: VARA HF/FM, FREEDATA
  MODE_FAX          = 11;
  MODE_FM           = 12;
  MODE_FSK          = 13;
  MODE_FT8          = 14;
  MODE_HELL         = 15;
  MODE_ISCAT        = 16;
  MODE_JT4          = 17;
  MODE_JT9          = 18;
  MODE_JT44         = 19;
  MODE_JT65         = 20;
  MODE_MFSK         = 21;  // Submodes: FST4, FST4W, FT2, FT4, JS8, MSK144, Q65
  MODE_MTONE        = 22;
  MODE_MSK144       = 23;
  MODE_OFDM         = 24;
  MODE_OLIVIA       = 25;
  MODE_OPERA        = 26;
  MODE_PAC          = 27;
  MODE_PAX          = 28;
  MODE_PKT          = 29;
  MODE_PSK          = 30;  // Submodes: PSK31, PSK63, PSK125, QPSK variants
  MODE_Q15          = 31;
  MODE_QRA64        = 32;
  MODE_ROS          = 33;
  MODE_RTTY         = 34;
  MODE_RTTYM        = 35;
  MODE_SSB          = 36;  // Submodes: USB, LSB
  MODE_SSTV         = 37;
  MODE_T10          = 38;
  MODE_THOR         = 39;
  MODE_THRB         = 40;
  MODE_TOR          = 41;
  MODE_V4           = 42;
  MODE_VOI          = 43;
  MODE_WINMOR       = 44;
  MODE_WSPR         = 45;
}

// Tracks whether a QSO has been synced with the QRZ logbook.
enum SyncStatus {
  SYNC_STATUS_LOCAL_ONLY = 0;  // Not yet uploaded
  SYNC_STATUS_SYNCED     = 1;  // Matches QRZ logbook
  SYNC_STATUS_MODIFIED   = 2;  // Local edits since last sync
  SYNC_STATUS_CONFLICT   = 3;  // Local and remote diverged
}

// QSL card / confirmation status (aligned with ADIF QSL Sent/Rcvd enumerations).
enum QslStatus {
  QSL_STATUS_UNSPECIFIED = 0;
  QSL_STATUS_NO          = 1;  // N — not sent/received
  QSL_STATUS_YES         = 2;  // Y — sent/received
  QSL_STATUS_REQUESTED   = 3;  // R — requested
  QSL_STATUS_QUEUED      = 4;  // Q — queued (sent only)
  QSL_STATUS_IGNORE      = 5;  // I — ignore/invalid
}

// Signal report (RST system).
message RstReport {
  optional uint32 readability = 1;  // 1-5
  optional uint32 strength    = 2;  // 1-9
  optional uint32 tone        = 3;  // 1-9 (CW/digital only)
  string raw                  = 4;  // Original string, e.g. "599" or "59"
}

// The core QSO (contact) record. This is LogRipper's primary entity.
message QsoRecord {
  // --- Identity ---
  string local_id              = 1;   // LogRipper-assigned UUID
  optional string qrz_logid    = 2;   // QRZ logbook record ID (after sync)
  optional string qrz_bookid   = 3;   // QRZ logbook ID

  // --- Core contact fields ---
  string station_callsign      = 10;  // Local operator's callsign
  string worked_callsign       = 11;  // Remote station callsign
  google.protobuf.Timestamp utc_timestamp = 12;
  Band band                    = 13;
  Mode mode                    = 14;
  optional uint64 frequency_khz = 15; // Precise frequency in kHz
  optional string submode      = 16;  // ADIF submode string (e.g., "USB", "PSK31")

  // --- Signal reports ---
  optional RstReport rst_sent      = 20;
  optional RstReport rst_received  = 21;
  optional string tx_power         = 22;  // Transmit power

  // --- QSL / confirmation ---
  QslStatus qsl_sent_status    = 30;
  QslStatus qsl_received_status = 31;
  optional bool lotw_sent      = 32;
  optional bool lotw_received  = 33;
  optional bool eqsl_sent      = 34;
  optional bool eqsl_received  = 35;

  // --- Enrichment from callsign lookup ---
  optional string worked_operator_name = 40;
  optional string worked_grid          = 41;
  optional string worked_country       = 42;
  optional uint32 worked_dxcc          = 43;
  optional string worked_state         = 44;
  optional uint32 worked_cq_zone      = 45;
  optional uint32 worked_itu_zone     = 46;
  optional string worked_county       = 47;
  optional string worked_iota         = 48;
  optional string worked_continent    = 49;  // 2-letter

  // --- Contest fields ---
  optional string contest_id           = 50;
  optional string serial_sent          = 51;
  optional string serial_received      = 52;
  optional string exchange_sent        = 53;
  optional string exchange_received    = 54;

  // --- Propagation ---
  optional string prop_mode            = 55;  // ADIF Propagation Mode enum value
  optional string sat_name             = 56;  // Satellite name
  optional string sat_mode             = 57;  // Satellite mode

  // --- Operator notes ---
  optional string notes                = 60;
  optional string comment              = 61;

  // --- Metadata ---
  google.protobuf.Timestamp created_at  = 70;
  google.protobuf.Timestamp updated_at  = 71;
  SyncStatus sync_status                = 72;

  // --- ADIF round-trip overflow ---
  // Stores ADIF fields not mapped to dedicated proto fields,
  // preserving them for lossless re-export. Key = ADIF field name (uppercase).
  map<string, string> extra_fields      = 80;
}
