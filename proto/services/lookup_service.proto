syntax = "proto3";

package qsoripper.services;

option csharp_namespace = "QsoRipper.Services";

import "services/batch_lookup_request.proto";
import "services/batch_lookup_response.proto";
import "services/get_cached_callsign_request.proto";
import "services/get_cached_callsign_response.proto";
import "services/get_dxcc_entity_request.proto";
import "services/get_dxcc_entity_response.proto";
import "services/lookup_request.proto";
import "services/lookup_response.proto";
import "services/stream_lookup_request.proto";
import "services/stream_lookup_response.proto";

// The app-facing callsign lookup interface.
//
// Maps to the architecture's lookup flow:
//   Client → LookupService → LookupCoordinator → CallsignProvider → QrzProvider
//
// Implementation status:
//   Lookup             — implemented
//   StreamLookup       — implemented
//   GetCachedCallsign  — implemented
//   GetDxccEntity      — planned (returns UNIMPLEMENTED)
//   BatchLookup        — planned (returns UNIMPLEMENTED)
//
// Transport: native gRPC (HTTP/2 + binary protobuf).
// Browser clients must go through a gRPC-Web proxy — see docs/api/client-integration.md.
//
// Client reference: docs/api/lookup-service.md
service LookupService {
  // Unary callsign lookup. The response envelope carries the final LookupResult.
  rpc Lookup(LookupRequest) returns (LookupResponse);

  // Server-streaming lookup that emits progressive LookupResult envelopes.
  rpc StreamLookup(StreamLookupRequest) returns (stream StreamLookupResponse);

  // Retrieve a callsign from the L1 in-memory cache only. No network call is made.
  rpc GetCachedCallsign(GetCachedCallsignRequest) returns (GetCachedCallsignResponse);

  // Look up a DXCC entity by numeric code or callsign prefix.
  rpc GetDxccEntity(GetDxccEntityRequest) returns (GetDxccEntityResponse);

  // Batch lookup for prefetch/contest scenarios. Returns one LookupResult per callsign,
  // in request order. Useful for warming the cache before a contest session begins.
  rpc BatchLookup(BatchLookupRequest) returns (BatchLookupResponse);
}
