syntax = "proto3";

package qsoripper.services;

option csharp_namespace = "QsoRipper.Services";

import "services/runtime_config_value_kind.proto";

message RuntimeConfigDefinition {
  string key = 1;
  string label = 2;
  string description = 3;
  RuntimeConfigValueKind kind = 4;
  bool secret = 5;
  repeated string allowed_values = 6;
  bool required = 7;
}
