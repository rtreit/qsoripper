syntax = "proto3";

package qsoripper.services;

option csharp_namespace = "QsoRipper.Services";

import "domain/station_profile.proto";

message ActiveStationContext {
  optional string persisted_active_profile_id = 1;
  qsoripper.domain.StationProfile persisted_active_profile = 2;
  qsoripper.domain.StationProfile effective_active_profile = 3;
  bool has_session_override = 4;
  qsoripper.domain.StationProfile session_override_profile = 5;
  repeated string warnings = 6;
}
