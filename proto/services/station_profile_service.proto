syntax = "proto3";

package logripper.services;

option csharp_namespace = "LogRipper.Services";

import "services/clear_session_station_profile_override_request.proto";
import "services/clear_session_station_profile_override_response.proto";
import "services/delete_station_profile_request.proto";
import "services/delete_station_profile_response.proto";
import "services/get_active_station_context_request.proto";
import "services/get_active_station_context_response.proto";
import "services/get_station_profile_request.proto";
import "services/get_station_profile_response.proto";
import "services/list_station_profiles_request.proto";
import "services/list_station_profiles_response.proto";
import "services/save_station_profile_request.proto";
import "services/save_station_profile_response.proto";
import "services/set_active_station_profile_request.proto";
import "services/set_active_station_profile_response.proto";
import "services/set_session_station_profile_override_request.proto";
import "services/set_session_station_profile_override_response.proto";

// Persisted station-profile lifecycle plus bounded process-session override support.
service StationProfileService {
  // List every persisted station profile and indicate which one is active.
  rpc ListStationProfiles(ListStationProfilesRequest) returns (ListStationProfilesResponse);

  // Read a single persisted station profile by id.
  rpc GetStationProfile(GetStationProfileRequest) returns (GetStationProfileResponse);

  // Create or update a persisted station profile. When profile_id is omitted, the
  // server generates a stable id from the profile metadata.
  rpc SaveStationProfile(SaveStationProfileRequest) returns (SaveStationProfileResponse);

  // Delete a persisted station profile. The active profile cannot be deleted.
  rpc DeleteStationProfile(DeleteStationProfileRequest) returns (DeleteStationProfileResponse);

  // Switch the persisted active station profile used as the default station context.
  rpc SetActiveStationProfile(SetActiveStationProfileRequest) returns (SetActiveStationProfileResponse);

  // Read the effective active station context used for new QSO saves.
  rpc GetActiveStationContext(GetActiveStationContextRequest) returns (GetActiveStationContextResponse);

  // Apply an explicit process-session station override without mutating persisted profiles.
  rpc SetSessionStationProfileOverride(SetSessionStationProfileOverrideRequest) returns (SetSessionStationProfileOverrideResponse);

  // Clear the process-session station override and fall back to the persisted active profile.
  rpc ClearSessionStationProfileOverride(ClearSessionStationProfileOverrideRequest) returns (ClearSessionStationProfileOverrideResponse);
}
