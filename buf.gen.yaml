version: v2
plugins:
  # Rust code generation via prost
  - local: protoc-gen-prost
    out: src/rust/generated
    opt:
      - compile_well_known_types=true
  # Rust tonic gRPC stubs
  - local: protoc-gen-tonic
    out: src/rust/generated
  # C# code generation via grpc_csharp_plugin
  - local: protoc-gen-grpc-csharp
    out: src/dotnet/generated
    opt:
      - base_namespace=LogRipper
