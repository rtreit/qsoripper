name: Rust Quality

on:
  workflow_dispatch:
  workflow_call:
  push:
    paths:
      - ".github/workflows/rust-quality.yml"
      - "rust-toolchain.toml"
      - "src/c/**"
      - "src/rust/**"
      - "proto/**"
  pull_request:

permissions:
  contents: read

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.88.0 --profile minimal --component rustfmt --component clippy --component llvm-tools-preview
          rustup default 1.88.0
          rustc --version
          cargo --version

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src/rust -> target

      - name: Install protobuf and C build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler build-essential pkg-config
          protoc --version

      - name: Install Buf CLI
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: Install cargo-deny
        run: |
          cargo install cargo-deny --locked

      - name: Install cargo-llvm-cov
        run: |
          cargo install cargo-llvm-cov --locked

      - name: Check formatting
        run: cargo fmt --manifest-path src/rust/Cargo.toml --all -- --check

      - name: Run clippy with warnings denied
        run: cargo clippy --manifest-path src/rust/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests with coverage
        run: |
          cargo llvm-cov \
            --manifest-path src/rust/Cargo.toml \
            --workspace \
            --exclude qsoripper-stress \
            --exclude qsoripper-stress-tui \
            --lcov \
            --output-path rust-coverage.lcov

      - name: Check Rust coverage threshold
        run: |
          cargo llvm-cov report \
            --manifest-path src/rust/Cargo.toml \
            --ignore-filename-regex "qsoripper-stress" \
            --json \
            --summary-only \
            --output-path rust-coverage-summary.json
          python3 - <<'EOF'
          import json
          import os
          import sys

          with open("rust-coverage-summary.json", encoding="utf-8") as f:
              payload = json.load(f)

          report = payload["data"][0]
          totals = report["totals"]["lines"]
          coverage = float(totals["percent"])
          covered = int(totals["covered"])
          count = int(totals["count"])
          threshold = 80.0

          print(f"Rust line coverage: {coverage:.2f}% ({covered}/{count} lines)  (threshold: {threshold:.0f}%)")

          files = []
          for file_data in report["files"]:
              line_summary = file_data["summary"]["lines"]
              line_count = int(line_summary["count"])
              if line_count == 0:
                  continue
              files.append(
                  (
                      float(line_summary["percent"]),
                      int(line_summary["covered"]),
                      line_count,
                      os.path.relpath(file_data["filename"]).replace("\\", "/"),
                  )
              )

          print("Lowest line coverage files:")
          for percent, file_covered, file_count, filename in sorted(files, key=lambda item: item[0])[:5]:
              print(f"  - {filename}: {percent:.2f}% ({file_covered}/{file_count})")

          if coverage < threshold:
              print(f"FAIL: Rust line coverage {coverage:.2f}% is below the minimum threshold of {threshold:.0f}%")
              sys.exit(1)

          print("PASS: Rust coverage threshold met.")
          EOF

      - name: Upload Rust coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: |
            rust-coverage.lcov
            rust-coverage-summary.json

      - name: Run buf lint
        run: buf lint

      - name: Run cargo-deny
        working-directory: src/rust
        run: cargo deny check --config deny.toml
