name: Rust Quality

on:
  workflow_dispatch:
  workflow_call:
  push:
    paths:
      - ".github/workflows/rust-quality.yml"
      - "rust-toolchain.toml"
      - "src/c/**"
      - "src/rust/**"
      - "proto/**"
  pull_request:

permissions:
  contents: read

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.88.0 --profile minimal --component rustfmt --component clippy --component llvm-tools-preview
          rustup default 1.88.0
          rustc --version
          cargo --version

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src/rust -> target

      - name: Install protobuf and C build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler build-essential pkg-config
          protoc --version

      - name: Install Buf CLI
        uses: bufbuild/buf-setup-action@v1

      - name: Install cargo-deny
        run: |
          cargo install cargo-deny --locked

      - name: Install cargo-llvm-cov
        run: |
          cargo install cargo-llvm-cov --locked

      - name: Check formatting
        run: cargo fmt --manifest-path src/rust/Cargo.toml --all -- --check

      - name: Run clippy with warnings denied
        run: cargo clippy --manifest-path src/rust/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests with coverage
        run: |
          cargo llvm-cov \
            --manifest-path src/rust/Cargo.toml \
            --all \
            --lcov \
            --output-path rust-coverage.lcov \
            --fail-under-lines 80

      - name: Upload Rust coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: rust-coverage.lcov

      - name: Run buf lint
        run: buf lint

      - name: Run cargo-deny
        working-directory: src/rust
        run: cargo deny check --config deny.toml
