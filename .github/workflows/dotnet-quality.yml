name: .NET Quality

on:
  workflow_dispatch:
  workflow_call:
  push:
    paths:
      - ".github/workflows/dotnet-quality.yml"
      - "global.json"
      - "src/dotnet/**"
      - "proto/**"
  pull_request:

permissions:
  contents: read

jobs:
  dotnet-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Verify formatting
        run: dotnet format src/dotnet/LogRipper.slnx --verify-no-changes

      - name: Build
        run: dotnet build src/dotnet/LogRipper.slnx

      - name: Run tests with coverage
        run: dotnet test src/dotnet/LogRipper.slnx --no-build --collect:"XPlat Code Coverage" --settings src/dotnet/CodeCoverage.runsettings --results-directory coverage

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"coverage/**/coverage.cobertura.xml" \
            -targetdir:"coverage/report" \
            -reporttypes:"Html;TextSummary" \
            -verbosity:Warning

      - name: Check .NET coverage threshold
        run: |
          python3 - <<'EOF'
          import re, sys
          text = open("coverage/report/Summary.txt").read()
          m = re.search(r"Line coverage:\s+(\d+\.?\d*)%", text)
          if not m:
              print("ERROR: Could not parse line coverage from summary.")
              sys.exit(1)
          cov = float(m.group(1))
          threshold = 50.0
          print(f"Line coverage: {cov:.1f}%  (threshold: {threshold:.0f}%)")
          if cov < threshold:
              print(f"FAIL: coverage {cov:.1f}% is below the minimum threshold of {threshold:.0f}%")
              sys.exit(1)
          print("PASS: coverage threshold met.")
          EOF

      - name: Upload .NET coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-coverage
          path: coverage/report/

      - name: Check for vulnerable packages
        run: dotnet list src/dotnet/LogRipper.slnx package --vulnerable --include-transitive
