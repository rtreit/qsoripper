version: v2
modules:
  - path: proto
    name: buf.build/qsoripper/qsoripper
lint:
  use:
    - STANDARD
  # QsoRipper intentionally keeps repo-scoped packages under proto/domain and
  # proto/services and preserves operational zero-values for enums where zero is
  # the true default behavior. RPC envelopes follow Buf's standard request and
  # response naming/uniqueness rules.
  except:
    - ENUM_ZERO_VALUE_SUFFIX
    - PACKAGE_DIRECTORY_MATCH
    - PACKAGE_VERSION_SUFFIX
  rpc_allow_google_protobuf_empty_requests: true
  rpc_allow_google_protobuf_empty_responses: true
breaking:
  use:
    - FILE
